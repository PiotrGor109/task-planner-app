apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: task-planner-ingress
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: default-strip-api@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: task-planner-app.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: task-planner-app
                port:
                  number: 8080

          - path: /
            pathType: Prefix
            backend:
              service:
                name: task-planner-app-fe
                port:
                  number: 80
